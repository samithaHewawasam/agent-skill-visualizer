<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Skills — Complete Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #060810;
    --surface: #0b0e18;
    --border:  #161b2e;
    --dim:     #1e2438;
    --primary: #818cf8;
    --primary-dk: #1e1b4b;
    --secondary: #34d399;
    --secondary-dk: #052e16;
    --accent:  #fb923c;
    --accent-dk: #1c0a00;
    --highlight: #38bdf8;
    --highlight-dk: #0c1a2e;
    --ok:      #4ade80;
    --warn:    #fbbf24;
    --text:    #cbd5e1;
    --muted:   #334155;
    --dim-t:   #475569;
    --font:    'IBM Plex Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  @keyframes fadeIn   { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn  { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes glow     { 0%,100%{box-shadow:0 0 20px rgba(129,140,248,.2)} 50%{box-shadow:0 0 30px rgba(129,140,248,.4)} }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; }

  #header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
    flex-shrink: 0;
  }

  #progress-bar {
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    background: var(--surface);
  }

  #slide-container {
    flex: 1;
    overflow-y: auto;
    padding: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #footer {
    padding: 20px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: var(--surface);
  }

  /* Slide */
  .slide {
    max-width: 1200px;
    width: 100%;
    animation: fadeIn 0.4s ease;
  }

  .slide-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .slide-subtitle {
    font-size: 18px;
    color: var(--dim-t);
    margin-bottom: 48px;
    letter-spacing: 0.05em;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    animation: slideIn 0.5s ease;
  }

  .card-header {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim-t);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .card-content {
    font-size: 14px;
    line-height: 1.8;
    color: var(--muted);
  }

  /* Code blocks */
  .code-block {
    background: var(--primary-dk);
    border: 1px solid var(--primary);
    border-left: 4px solid var(--primary);
    border-radius: 8px;
    padding: 20px;
    margin: 20px 0;
    position: relative;
    overflow-x: auto;
  }

  .code-block::before {
    content: attr(data-label);
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--primary);
    opacity: 0.6;
  }

  .code-block pre {
    font-family: var(--font);
    font-size: 13px;
    color: #a5b4fc;
    line-height: 1.6;
    white-space: pre;
    overflow-x: auto;
  }

  /* Comparison grid */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin: 32px 0;
  }

  .compare-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
  }

  .compare-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    border-radius: 12px 12px 0 0;
  }

  .compare-card.claude::before { background: var(--primary); }
  .compare-card.openai::before { background: var(--ok); }

  .compare-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .compare-badge {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.1em;
  }

  .compare-badge.claude {
    background: rgba(129,140,248,0.15);
    color: var(--primary);
    border: 1px solid var(--primary);
  }

  .compare-badge.openai {
    background: rgba(74,222,128,0.15);
    color: var(--ok);
    border: 1px solid var(--ok);
  }

  /* Flow diagram */
  .flow {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 32px 0;
  }

  .flow-step {
    display: flex;
    align-items: center;
    gap: 16px;
    animation: slideIn 0.5s ease;
  }

  .flow-number {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--primary-dk);
    border: 2px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
  }

  .flow-content {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }

  .flow-label {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .flow-desc {
    font-size: 13px;
    color: var(--dim-t);
    line-height: 1.6;
  }

  .flow-arrow {
    text-align: center;
    color: var(--primary);
    font-size: 24px;
    margin: -8px 0;
  }

  /* Feature list */
  .feature-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin: 32px 0;
  }

  .feature-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: all 0.3s;
  }

  .feature-item:hover {
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(129,140,248,0.15);
  }

  .feature-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--primary-dk);
    border: 1px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 16px;
  }

  .feature-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .feature-desc {
    font-size: 12px;
    color: var(--dim-t);
    line-height: 1.6;
  }

  /* Problem cards */
  .problem-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin: 32px 0;
  }

  .problem-card {
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .problem-card::before {
    content: '⚠';
    position: absolute;
    top: -20px;
    right: -20px;
    font-size: 120px;
    opacity: 0.05;
  }

  .problem-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--warn);
  }

  .problem-desc {
    font-size: 13px;
    color: var(--dim-t);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .solution {
    background: var(--secondary-dk);
    border: 1px solid var(--secondary);
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    color: var(--secondary);
  }

  .solution::before {
    content: '✓ Solution: ';
    font-weight: 600;
  }

  /* Progress dots */
  .progress-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 11px;
    color: var(--dim-t);
    flex-shrink: 0;
  }

  .progress-dot:hover {
    border-color: var(--primary);
    transform: scale(1.1);
  }

  .progress-dot.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(129,140,248,0.4);
    width: 40px;
    height: 40px;
    font-weight: 700;
  }

  .progress-dot.done {
    background: rgba(129,140,248,0.15);
    border-color: var(--primary);
    color: var(--primary);
  }

  .progress-line {
    width: 24px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  .progress-line.done {
    background: var(--primary);
  }

  /* Buttons */
  .btn {
    padding: 10px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-dk);
    color: var(--primary);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--bg);
  }

  .btn.primary:hover:not(:disabled) {
    background: #a5b4fc;
    border-color: #a5b4fc;
  }

  /* Highlight boxes */
  .highlight-box {
    background: var(--highlight-dk);
    border: 1px solid var(--highlight);
    border-left: 4px solid var(--highlight);
    border-radius: 8px;
    padding: 20px;
    margin: 24px 0;
  }

  .highlight-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--highlight);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  .highlight-content {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
  }

  /* Lists */
  .custom-list {
    list-style: none;
    padding: 0;
  }

  .custom-list li {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.6;
    color: var(--muted);
    position: relative;
    padding-left: 32px;
  }

  .custom-list li:last-child {
    border-bottom: none;
  }

  .custom-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--primary);
    font-weight: 700;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin: 32px 0;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
  }

  .stat-number {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--dim-t);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Table */
  .comparison-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 32px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .comparison-table th {
    background: var(--dim);
    color: var(--text);
    padding: 16px;
    text-align: left;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .comparison-table td {
    padding: 16px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--dim-t);
    line-height: 1.6;
  }

  .comparison-table tr:hover td {
    background: rgba(129,140,248,0.05);
  }

  /* Counter */
  .slide-counter {
    font-size: 13px;
    color: var(--dim-t);
  }

  .slide-counter .current {
    color: var(--primary);
    font-weight: 700;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="font-size: 10px; color: var(--dim-t); letter-spacing: 0.2em; margin-bottom: 8px;">COMPREHENSIVE GUIDE</div>
    <div style="font-size: 28px; font-weight: 700; color: var(--text);">Agent Skills System — Deep Dive</div>
    <div style="font-size: 13px; color: var(--dim-t); margin-top: 8px;">Understanding prompt augmentation, skill selection, and intelligent context loading</div>
  </div>

  <div id="progress-bar"></div>

  <div id="slide-container">
    <div class="slide" id="slide-content"></div>
  </div>

  <div id="footer">
    <div class="slide-counter">
      Slide <span class="current" id="current-slide">1</span> / <span id="total-slides">15</span>
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="btn" id="btn-prev" onclick="navigate(-1)">← Previous</button>
      <button class="btn primary" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>
</div>

<script>
const SLIDES = [
  // Slide 1: Introduction
  {
    title: 'What Are Agent Skills?',
    subtitle: 'The foundation of intelligent prompt augmentation',
    content: `
      <div class="card">
        <div class="card-header">Core Concept</div>
        <div class="card-title">Skills = Modular Knowledge Bundles</div>
        <div class="card-content">
          Agent skills are discrete, self-contained packages of documentation, patterns, and context that can be dynamically injected into an LLM's prompt. Instead of loading every piece of knowledge upfront, skills enable selective, intelligent context loading based on what the user is actually trying to do.
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number">∞</div>
          <div class="stat-label">Scalable Knowledge</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">⚡</div>
          <div class="stat-label">Dynamic Loading</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">🎯</div>
          <div class="stat-label">Context Aware</div>
        </div>
      </div>

      <div class="highlight-box">
        <div class="highlight-title">💡 Key Insight</div>
        <div class="highlight-content">
          Skills solve the fundamental limitation of LLMs: <strong>context window size</strong>. You can't load your entire codebase, all documentation, and every pattern into the prompt. Skills let you load exactly what's needed, when it's needed.
        </div>
      </div>
    `
  },

  // Slide 2: The Problem
  {
    title: 'Problems We\'re Solving',
    subtitle: 'Why traditional approaches fall short',
    content: `
      <div class="problem-grid">
        <div class="problem-card">
          <div class="problem-title">Context Window Limits</div>
          <div class="problem-desc">
            Modern LLMs have 200K+ token limits, but loading everything is wasteful and slow. Most context goes unused.
          </div>
          <div class="solution">Skills load only relevant documentation for the specific task</div>
        </div>

        <div class="problem-card">
          <div class="problem-title">Knowledge Fragmentation</div>
          <div class="problem-desc">
            Documentation, patterns, APIs, and conventions are scattered across wikis, READMEs, and developer brains.
          </div>
          <div class="solution">Skills centralize knowledge in discoverable, reusable modules</div>
        </div>

        <div class="problem-card">
          <div class="problem-title">Stale System Prompts</div>
          <div class="problem-desc">
            Hardcoded system prompts become outdated quickly and require redeployment to update.
          </div>
          <div class="solution">Skills are files on disk — update anytime, no deployment needed</div>
        </div>

        <div class="problem-card">
          <div class="problem-title">Generic Responses</div>
          <div class="problem-desc">
            Without project-specific context, LLMs give generic advice that doesn't match your patterns or tools.
          </div>
          <div class="solution">Skills inject your exact conventions, APIs, and component library</div>
        </div>
      </div>

      <div class="highlight-box">
        <div class="highlight-title">🎯 The Core Problem</div>
        <div class="highlight-content">
          You have <strong>megabytes of documentation</strong>, but only <strong>~20KB is relevant</strong> to any given user request. Skills dynamically select and inject the right 20KB every time.
        </div>
      </div>
    `
  },

  // Slide 3: The Two-Step Process
  {
    title: 'How It Works: Two-Step Pipeline',
    subtitle: 'Skill selection → Prompt augmentation → Response generation',
    content: `
      <div class="flow">
        <div class="flow-step">
          <div class="flow-number">1</div>
          <div class="flow-content">
            <div class="flow-label">User Sends Prompt</div>
            <div class="flow-desc">"Create a new list page with search and pagination"</div>
          </div>
        </div>

        <div class="flow-arrow">↓</div>

        <div class="flow-step">
          <div class="flow-number">2</div>
          <div class="flow-content">
            <div class="flow-label">Skill Selection (Fast Model)</div>
            <div class="flow-desc">A lightweight model (Haiku) reads the prompt + all skill frontmatter and selects relevant skills with confidence scores</div>
          </div>
        </div>

        <div class="flow-arrow">↓</div>

        <div class="flow-step">
          <div class="flow-number">3</div>
          <div class="flow-content">
            <div class="flow-label">Lazy Content Loading</div>
            <div class="flow-desc">ONLY the selected skills' full content is loaded from disk (not the entire skill library)</div>
          </div>
        </div>

        <div class="flow-arrow">↓</div>

        <div class="flow-step">
          <div class="flow-number">4</div>
          <div class="flow-content">
            <div class="flow-label">Prompt Augmentation</div>
            <div class="flow-desc">Original prompt + loaded skill documentation are combined into an enriched context</div>
          </div>
        </div>

        <div class="flow-arrow">↓</div>

        <div class="flow-step">
          <div class="flow-number">5</div>
          <div class="flow-content">
            <div class="flow-label">Response Generation (Quality Model)</div>
            <div class="flow-desc">A powerful model (Sonnet) generates the final response with full project context</div>
          </div>
        </div>
      </div>

      <div class="code-block" data-label="EXAMPLE FLOW">
<pre>Prompt: "Add dark mode toggle"

Selection Model picks:
  • design-system (0.95 confidence)
  • state-management (0.87 confidence)
  • theme-configuration (0.91 confidence)

Augmented prompt sent to generation model:
  [Skill: Design System]
  Your app uses styled-components with a ThemeProvider...

  [Skill: State Management]
  Use Zustand for global state. Create a store like...

  [Skill: Theme Config]
  Themes defined in src/theme/...

  User Request: "Add dark mode toggle"
</pre>
      </div>
    `
  },

  // Slide 4: Why Two Models?
  {
    title: 'Why Use Two Different Models?',
    subtitle: 'Cost optimization meets quality',
    content: `
      <div class="compare-grid">
        <div class="compare-card claude">
          <div class="compare-title">
            <span class="compare-badge claude">SELECTION MODEL</span>
            <span>Haiku 4.5</span>
          </div>
          <ul class="custom-list">
            <li><strong>Fast:</strong> Sub-second latency</li>
            <li><strong>Cheap:</strong> ~$0.001 per selection</li>
            <li><strong>Sufficient:</strong> Only needs to read frontmatter (name + description)</li>
            <li><strong>Task:</strong> Pattern matching — which skills relate to this prompt?</li>
          </ul>
        </div>

        <div class="compare-card openai">
          <div class="compare-title">
            <span class="compare-badge openai">GENERATION MODEL</span>
            <span>Sonnet 4.6</span>
          </div>
          <ul class="custom-list">
            <li><strong>Powerful:</strong> Deep reasoning capabilities</li>
            <li><strong>Contextual:</strong> Reads full skill documentation</li>
            <li><strong>Quality:</strong> Produces production-ready code</li>
            <li><strong>Task:</strong> Generate accurate response with augmented context</li>
          </ul>
        </div>
      </div>

      <div class="highlight-box">
        <div class="highlight-title">💰 Cost Efficiency</div>
        <div class="highlight-content">
          Using Haiku for selection saves ~90% compared to using Sonnet for both steps. Selection only needs lightweight pattern matching, not deep reasoning. This architecture processes 10,000 requests at the same cost as 1,000 requests with a single model.
        </div>
      </div>

      <div class="card">
        <div class="card-header">Alternative: Same Model?</div>
        <div class="card-title">You CAN use the same model for both</div>
        <div class="card-content">
          For simplicity or consistency, you can use one model (e.g., Sonnet) for both selection and generation. The trade-off is higher cost and slightly slower selection. The architecture remains identical — it's just a configuration change.
        </div>
      </div>
    `
  },

  // Slide 5: Frontmatter
  {
    title: 'What is Frontmatter?',
    subtitle: 'Metadata for efficient skill discovery',
    content: `
      <div class="card">
        <div class="card-header">Definition</div>
        <div class="card-title">Frontmatter = Skill Index</div>
        <div class="card-content">

// State
let currentSlide = 0;

// Navigation
function navigate(direction) {
  const newSlide = currentSlide + direction;
  if (newSlide >= 0 && newSlide < SLIDES.length) {
    currentSlide = newSlide;
    render();
  }
}

function goToSlide(index) {
  if (index >= 0 && index < SLIDES.length) {
    currentSlide = index;
    render();
  }
}

// Render
function render() {
  const slide = SLIDES[currentSlide];

  // Update slide content
  document.getElementById('slide-content').innerHTML = `
    <div class="slide-title">${slide.title}</div>
    <div class="slide-subtitle">${slide.subtitle}</div>
    ${slide.content}
  `;

  // Update progress bar
  let progressHTML = '';
  SLIDES.forEach((_, i) => {
    const isDone = i < currentSlide;
    const isActive = i === currentSlide;
    const classes = ['progress-dot'];
    if (isDone) classes.push('done');
    if (isActive) classes.push('active');

    progressHTML += `<div class="${classes.join(' ')}" onclick="goToSlide(${i})">${isDone ? '✓' : i + 1}</div>`;

    if (i < SLIDES.length - 1) {
      progressHTML += `<div class="progress-line ${i < currentSlide ? 'done' : ''}"></div>`;
    }
  });

  document.getElementById('progress-bar').innerHTML = progressHTML;

  // Update counter
  document.getElementById('current-slide').textContent = currentSlide + 1;
  document.getElementById('total-slides').textContent = SLIDES.length;

  // Update buttons
  document.getElementById('btn-prev').disabled = currentSlide === 0;
  document.getElementById('btn-next').disabled = currentSlide === SLIDES.length - 1;

  // Scroll to top
  document.getElementById('slide-container').scrollTop = 0;
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// Initialize
render();
</script>
