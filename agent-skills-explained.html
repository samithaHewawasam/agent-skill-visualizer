<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Skills — Complete Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #1a1a1a;
    --surface: #242424;
    --border:  #3a3a3a;
    --dim:     #2d2d2d;
    --primary: #F89680;
    --primary-dk: #2d1f1a;
    --secondary: #ff9d7e;
    --secondary-dk: #2d1f1a;
    --accent:  #ff7b5f;
    --accent-dk: #2d1f1a;
    --highlight: #ffa68a;
    --highlight-dk: #2d1f1a;
    --ok:      #ff9d7e;
    --warn:    #ffb399;
    --text:    #e5e5e5;
    --muted:   #9a9a9a;
    --dim-t:   #6a6a6a;
    --font:    'IBM Plex Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  @keyframes fadeIn   { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn  { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes glow     { 0%,100%{box-shadow:0 0 20px rgba(248,150,128,.2)} 50%{box-shadow:0 0 30px rgba(248,150,128,.4)} }
  @keyframes slideInRight { from{opacity:0;transform:translateX(50px)} to{opacity:1;transform:translateX(0)} }
  @keyframes slideInLeft { from{opacity:0;transform:translateX(-50px)} to{opacity:1;transform:translateX(0)} }
  @keyframes bounceIn { 0%{opacity:0;transform:scale(0.3)} 50%{transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
  @keyframes typing { from{width:0} to{width:100%} }
  @keyframes blink { 50%{border-color:transparent} }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; }

  #header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(248,150,128,0.05) 0%, var(--bg) 100%);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 32px;
  }

  #header-content {
    flex: 1;
    min-width: 0;
  }

  #logo {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(248,150,128,0.2);
  }

  #progress-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
    max-width: 400px;
    justify-content: flex-end;
  }

  #slide-container {
    flex: 1;
    overflow-y: auto;
    padding: 64px 48px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  #footer {
    padding: 20px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: linear-gradient(0deg, rgba(248,150,128,0.05) 0%, var(--bg) 100%);
  }

  /* Slide */
  .slide {
    max-width: 1200px;
    width: 100%;
    animation: fadeIn 0.4s ease;
  }

  .slide-title {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #F89680 0%, #ff7b5f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .slide-subtitle {
    font-size: 18px;
    color: var(--dim-t);
    margin-bottom: 48px;
    letter-spacing: 0.05em;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    animation: slideIn 0.5s ease;
  }

  .card-header {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim-t);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .card-content {
    font-size: 14px;
    line-height: 1.8;
    color: var(--muted);
  }

  /* Code blocks */
  .code-block {
    background: var(--primary-dk);
    border: 1px solid rgba(248,150,128,0.3);
    border-left: 4px solid var(--primary);
    border-radius: 8px;
    padding: 20px;
    margin: 20px 0;
    position: relative;
    overflow-x: auto;
  }

  .code-block::before {
    content: attr(data-label);
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--primary);
    opacity: 0.6;
  }

  .code-block pre {
    font-family: var(--font);
    font-size: 13px;
    color: #ffccbc;
    line-height: 1.6;
    white-space: pre;
    overflow-x: auto;
  }

  /* Comparison grid */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin: 32px 0;
  }

  .compare-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
  }

  .compare-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    border-radius: 12px 12px 0 0;
  }

  .compare-card.claude::before { background: var(--primary); }
  .compare-card.openai::before { background: var(--ok); }

  .compare-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .compare-badge {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.1em;
  }

  .compare-badge.claude {
    background: rgba(248,150,128,0.15);
    color: var(--primary);
    border: 1px solid var(--primary);
  }

  .compare-badge.openai {
    background: rgba(255,157,126,0.15);
    color: var(--ok);
    border: 1px solid var(--ok);
  }

  /* Flow diagram */
  .flow {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 32px 0;
  }

  .flow-step {
    display: flex;
    align-items: center;
    gap: 16px;
    animation: slideIn 0.5s ease;
  }

  .flow-number {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(248,150,128,0.1);
    border: 2px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
  }

  .flow-content {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }

  .flow-label {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .flow-desc {
    font-size: 13px;
    color: var(--dim-t);
    line-height: 1.6;
  }

  .flow-arrow {
    text-align: center;
    color: var(--primary);
    font-size: 24px;
    margin: -8px 0;
  }

  /* Feature list */
  .feature-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin: 32px 0;
  }

  .feature-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: all 0.3s;
  }

  .feature-item:hover {
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(248,150,128,0.15);
  }

  .feature-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: rgba(248,150,128,0.1);
    border: 1px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 16px;
  }

  .feature-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .feature-desc {
    font-size: 12px;
    color: var(--dim-t);
    line-height: 1.6;
  }

  /* Problem cards */
  .problem-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin: 32px 0;
  }

  .problem-card {
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .problem-card::before {
    content: '⚠';
    position: absolute;
    top: -20px;
    right: -20px;
    font-size: 120px;
    opacity: 0.08;
    color: var(--primary);
  }

  .problem-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--warn);
  }

  .problem-desc {
    font-size: 13px;
    color: var(--dim-t);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .solution {
    background: rgba(248,150,128,0.1);
    border: 1px solid var(--secondary);
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    color: var(--secondary);
  }

  .solution::before {
    content: '✓ Solution: ';
    font-weight: 600;
  }

  /* Progress dots - inline indicator style */
  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 0px;
    color: transparent;
    flex-shrink: 0;
    opacity: 0.4;
    align-self: flex-end;
    margin-bottom: 2px;
  }

  .progress-dot:hover {
    border-color: var(--primary);
    opacity: 0.8;
  }

  .progress-dot.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--bg);
    box-shadow: 0 0 15px rgba(248,150,128,0.5);
    width: 12px;
    height: 12px;
    font-size: 0px;
    opacity: 1;
    align-self: center;
    margin-bottom: 0;
  }

  .progress-dot.adjacent {
    opacity: 0.6;
    width: 6px;
    height: 6px;
    background: rgba(248,150,128,0.3);
    border-color: rgba(248,150,128,0.5);
  }

  .progress-line {
    width: 8px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    opacity: 0.3;
    align-self: flex-end;
    margin-bottom: 4px;
  }

  .progress-line.active {
    background: var(--primary);
    opacity: 0.6;
  }

  /* Buttons */
  .btn {
    padding: 10px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-dk);
    color: var(--primary);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--bg);
  }

  .btn.primary:hover:not(:disabled) {
    background: #ff7b5f;
    border-color: #ff7b5f;
    box-shadow: 0 0 20px rgba(248,150,128,0.3);
  }

  /* Highlight boxes */
  .highlight-box {
    background: rgba(248,150,128,0.08);
    border: 1px solid var(--highlight);
    border-left: 4px solid var(--highlight);
    border-radius: 8px;
    padding: 20px;
    margin: 24px 0;
  }

  .highlight-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--highlight);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  .highlight-content {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
  }

  /* Lists */
  .custom-list {
    list-style: none;
    padding: 0;
  }

  .custom-list li {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.6;
    color: var(--muted);
    position: relative;
    padding-left: 32px;
  }

  .custom-list li:last-child {
    border-bottom: none;
  }

  .custom-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--primary);
    font-weight: 700;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin: 32px 0;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
  }

  .stat-number {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, #F89680 0%, #ff7b5f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--dim-t);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Table */
  .comparison-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 32px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .comparison-table th {
    background: var(--dim);
    color: var(--text);
    padding: 16px;
    text-align: left;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .comparison-table td {
    padding: 16px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--dim-t);
    line-height: 1.6;
  }

  .comparison-table tr:hover td {
    background: rgba(248,150,128,0.05);
  }

  /* Counter */
  .slide-counter {
    font-size: 13px;
    color: var(--dim-t);
  }

  .slide-counter .current {
    color: var(--primary);
    font-weight: 700;
  }

  .author-credit {
    font-size: 11px;
    color: var(--dim-t);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .author-credit .name {
    color: var(--primary);
    font-weight: 600;
  }

  /* Interactive Prompt Roles */
  .prompt-roles-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin: 40px 0;
  }

  .role-actor {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    animation: bounceIn 0.6s ease;
  }

  .role-actor:nth-child(1) { animation-delay: 0.1s; }
  .role-actor:nth-child(2) { animation-delay: 0.3s; }
  .role-actor:nth-child(3) { animation-delay: 0.5s; }
  .role-actor:nth-child(4) { animation-delay: 0.7s; }

  .actor-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    background: rgba(248,150,128,0.1);
    border: 2px solid var(--primary);
    transition: all 0.3s;
  }

  .role-actor:hover .actor-icon {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(248,150,128,0.4);
  }

  .actor-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--primary);
    text-align: center;
  }

  .actor-role {
    font-size: 13px;
    color: var(--dim-t);
    text-align: center;
    line-height: 1.6;
  }

  .conversation-demo {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin: 32px 0;
    max-height: 500px;
    overflow-y: auto;
  }

  .message {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: slideInLeft 0.5s ease;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .message.user {
    flex-direction: row-reverse;
    animation: slideInRight 0.5s ease;
    animation-fill-mode: forwards;
  }

  .message:nth-child(1) { animation-delay: 0.2s; }
  .message:nth-child(2) { animation-delay: 0.8s; }
  .message:nth-child(3) { animation-delay: 1.4s; }
  .message:nth-child(4) { animation-delay: 2.0s; }

  .message-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 2px solid;
  }

  .message.system .message-avatar {
    background: rgba(100,100,100,0.2);
    border-color: #888;
  }

  .message.user .message-avatar {
    background: rgba(248,150,128,0.2);
    border-color: var(--primary);
  }

  .message.assistant .message-avatar {
    background: rgba(248,150,128,0.15);
    border-color: var(--secondary);
  }

  .message-content {
    flex: 1;
    background: var(--dim);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    position: relative;
  }

  .message-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--dim-t);
    margin-bottom: 8px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .message.system .message-label { color: #888; }
  .message.user .message-label { color: var(--primary); }
  .message.assistant .message-label { color: var(--secondary); }

  .message-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  .prompt-flow-visual {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 40px 0;
    flex-wrap: wrap;
  }

  .flow-actor {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: bounceIn 0.6s ease;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .flow-actor:nth-child(1) { animation-delay: 0.1s; }
  .flow-actor:nth-child(2) { animation-delay: 0.5s; }
  .flow-actor:nth-child(3) { animation-delay: 0.9s; }
  .flow-actor:nth-child(4) { animation-delay: 1.3s; }
  .flow-actor:nth-child(5) { animation-delay: 1.7s; }

  .flow-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    background: rgba(248,150,128,0.1);
    border: 2px solid var(--primary);
  }

  .flow-label {
    font-size: 11px;
    color: var(--dim-t);
    text-align: center;
  }

  .flow-separator {
    font-size: 24px;
    color: var(--primary);
    animation: pulse 2s ease-in-out infinite;
  }

  /* Interactive Problem Cards */
  .problem-card {
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .problem-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(248,150,128,0.2);
  }

  .problem-card.active {
    grid-column: 1 / -1;
    border-color: var(--primary);
  }

  .problem-demo {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: all 0.5s ease;
    margin-top: 0;
  }

  .problem-card.active .problem-demo {
    max-height: 2000px;
    opacity: 1;
    margin-top: 20px;
  }

  .demo-visual {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-top: 16px;
  }

  .file-scattered {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin: 16px 0;
  }

  .file-item {
    background: rgba(248,150,128,0.1);
    border: 1px solid var(--primary);
    border-radius: 6px;
    padding: 12px;
    text-align: center;
    font-size: 11px;
    animation: bounceIn 0.4s ease;
    position: relative;
  }

  .file-item::before {
    content: '📄';
    display: block;
    font-size: 24px;
    margin-bottom: 8px;
  }

  .file-item:nth-child(1) { animation-delay: 0.1s; opacity: 0; animation-fill-mode: forwards; }
  .file-item:nth-child(2) { animation-delay: 0.2s; opacity: 0; animation-fill-mode: forwards; }
  .file-item:nth-child(3) { animation-delay: 0.3s; opacity: 0; animation-fill-mode: forwards; }

// State
let currentSlide = 0;

// Navigation
function navigate(direction) {
  const newSlide = currentSlide + direction;
  if (newSlide >= 0 && newSlide < SLIDES.length) {
    currentSlide = newSlide;
    render();
  }
}

function goToSlide(index) {
  if (index >= 0 && index < SLIDES.length) {
    currentSlide = index;
    render();
  }
}

// Render
function render() {
  const slide = SLIDES[currentSlide];

  // Update slide content
  document.getElementById('slide-content').innerHTML = `
    <div class="slide-title">${slide.title}</div>
    <div class="slide-subtitle">${slide.subtitle}</div>
    ${slide.content}
  `;

  // Update progress bar - inline indicator (only show prev, current, next)
  let progressHTML = '';
  const prevSlide = currentSlide - 1;
  const nextSlide = currentSlide + 1;

  // Show previous dot if exists
  if (prevSlide >= 0) {
    progressHTML += `<div class="progress-dot adjacent" onclick="goToSlide(${prevSlide})" title="Slide ${prevSlide + 1}"></div>`;
    progressHTML += `<div class="progress-line active"></div>`;
  }

  // Show current dot (always visible)
  progressHTML += `<div class="progress-dot active" onclick="goToSlide(${currentSlide})" title="Slide ${currentSlide + 1}"></div>`;

  // Show next dot if exists
  if (nextSlide < SLIDES.length) {
    progressHTML += `<div class="progress-line"></div>`;
    progressHTML += `<div class="progress-dot adjacent" onclick="goToSlide(${nextSlide})" title="Slide ${nextSlide + 1}"></div>`;
  }

  document.getElementById('progress-bar').innerHTML = progressHTML;

  // Update counter
  document.getElementById('current-slide').textContent = currentSlide + 1;
  document.getElementById('total-slides').textContent = SLIDES.length;

  // Update buttons
  document.getElementById('btn-prev').disabled = currentSlide === 0;
  document.getElementById('btn-next').disabled = currentSlide === SLIDES.length - 1;

  // Scroll to top
  document.getElementById('slide-container').scrollTop = 0;
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// Interactive problem card toggle
function toggleProblemDemo(event, cardIndex) {
  event.stopPropagation();

  const allCards = document.querySelectorAll('.problem-card');
  const clickedCard = allCards[cardIndex];

  // Toggle active state
  const wasActive = clickedCard.classList.contains('active');

  // Close all cards first
  allCards.forEach(card => card.classList.remove('active'));

  // If it wasn't active, open it
  if (!wasActive) {
    clickedCard.classList.add('active');

    // Scroll the card into view
    setTimeout(() => {
      clickedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
}

// Initialize
render();
</script>
